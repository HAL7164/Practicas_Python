<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Contacto</title>
</head>
<body>
    <h1>
    Agregar Contacto
    {% if errores %}
        <span style="color: red; font-size: 0.6em; font-weight: normal; margin-left: 20px; vertical-align: middle;">
            ⚠️ {{ errores.values() | first }}
        </span>
    {% endif %}
    </h1>
        
    <form action="/agregar" method="POST">
        <label>DNI:</label>    <!-- SIEMPRE editable, conserva el valor si hay error -->
        <input type="text" name="dni" value="{{ contacto.dni if contacto else '' }}">
        <br>

        <label>Nombre:</label>
        <!-- inputtype="text" name="nombre" value="{% if contacto %}{{ contacto[1] }}{% endif %}" required><br> -->
        <input type="text" name="nombre" value="{% if contacto %}{{ contacto[1] }}{% endif %}" ><br>
       
        <label>Apellido:</label>
        <input type="text" name="apellido" value="{% if contacto %}{{ contacto[2] }}{% endif %}" ><br>

        <label>Calle:</label>
        <input type="text" name="calle" value="{% if contacto %}{{ contacto[3] }}{% endif %}"><br>

        <label>Número:</label>
        <input type="text" name="numero" value="{% if contacto %}{{ contacto[4] }}{% endif %}"><br>

        <label>Código Postal:</label>
        <input type="text" name="codigo_postal" value="{% if contacto %}{{ contacto[5] }}{% endif %}"><br>

        <label>Email:</label>
        <input type="email" name="email" value="{% if contacto %}{{ contacto[6] }}{% endif %}"><br>

        <label>Teléfono:</label>
        <input type="text" name="telefono" value="{% if contacto %}{{ contacto[7] }}{% endif %}"><br>

        <label>Fecha de Nacimiento:</label>
        <input type="date" name="fecha_nacimiento" value="{% if contacto %}{{ contacto[8] }}{% endif %}"><br>

        <label>Gastos Mensuales:</label>
        <input type="number" step="0.01" name="gastos_mensuales" value="{% if contacto %}{{ contacto[9] }}{% endif %}"><br>

        <button type="submit">Guardar</button>
    </form>

    <p><a href="/listar">Volver a la lista</a></p>
    
</body>
</html>
